<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Abdiel Life Sciences</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family: Arial;
}

.product-card{
border:1px solid #eee;
padding:15px;
text-align:center;
border-radius:8px;
transition:0.3s;
background:white;
}

.product-card:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product-img{
width:100%;
height:170px;
object-fit:cover;
border-radius:6px;
}

.btn-orange{
background:#ff7a00;
color:white;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">

<div class="container">

<a class="navbar-brand">
<img src="Images/Asset 3.png" height="60">
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link">Home</a></li>
<li class="nav-item"><a class="nav-link">About</a></li>
<li class="nav-item"><a class="nav-link">Products</a></li>
<li class="nav-item"><a class="nav-link">Contact</a></li>

</ul>

</div>
</div>
</nav>


<!-- PRODUCTS -->

<section class="py-5">

<div class="container">

<h2 class="text-center mb-5">Our Products</h2>


<div class="row mb-4">

<div class="col-md-3">
<select id="category" class="form-control">
<option value="">Select Category</option>
<option value="tablets">Tablets</option>
<option value="capsules">Capsules</option>
<option value="syrups">Syrups</option>
</select>
</div>

<div class="col-md-3">
<select id="subcategory" class="form-control">
<option>Select Subcategory</option>
</select>
</div>

<div class="col-md-3">
<select id="type" class="form-control">
<option>Select Type</option>
</select>
</div>

<div class="col-md-3">
<input type="text" id="searchProduct" class="form-control" placeholder="Search product">
</div>

</div>


<div class="row g-4" id="productList">


<div class="col-lg-3 col-md-4 col-sm-6 product-item"
data-category="tablets"
data-subcategory="pain"
data-type="paracetamol">

<div class="product-card">

<img src="https://images.pexels.com/photos/208512/pexels-photo-208512.jpeg" class="product-img">

<h6 class="product-name mt-3">Paracetamol</h6>

<p>Pain Relief Tablet</p>

<button class="btn btn-orange btn-sm">View</button>

</div>
</div>


<div class="col-lg-3 col-md-4 col-sm-6 product-item"
data-category="tablets"
data-subcategory="pain"
data-type="ibuprofen">

<div class="product-card">

<img src="https://images.pexels.com/photos/208512/pexels-photo-208512.jpeg" class="product-img">

<h6 class="product-name mt-3">Ibuprofen</h6>

<p>Pain Relief Tablet</p>

<button class="btn btn-orange btn-sm">View</button>

</div>
</div>


<div class="col-lg-3 col-md-4 col-sm-6 product-item"
data-category="capsules"
data-subcategory="vitamin"
data-type="omega">

<div class="product-card">

<img src="https://www.shutterstock.com/image-photo/colorful-capsule-pills-blister-strip-260nw-1041811729.jpg" class="product-img">

<h6 class="product-name mt-3">Omega 3</h6>

<p>Vitamin Capsule</p>

<button class="btn btn-orange btn-sm">View</button>

</div>
</div>


<div class="col-lg-3 col-md-4 col-sm-6 product-item"
data-category="syrups"
data-subcategory="cough"
data-type="dry">

<div class="product-card">

<img src="https://www.graphicsfuel.com/wp-content/uploads/2022/12/medicine-syrup-bottle-mockup2.jpg" class="product-img">

<h6 class="product-name mt-3">Dry Cough Syrup</h6>

<p>Cough Syrup</p>

<button class="btn btn-orange btn-sm">View</button>

</div>
</div>


</div>
</div>
</section>



<footer class="text-center p-4 bg-light">
© 2026 Abdiel Life Sciences
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>

const search = document.getElementById("searchProduct");
const products = document.querySelectorAll(".product-item");

search.addEventListener("keyup", function(){

let value = search.value.toLowerCase();

products.forEach(function(p){

let name = p.querySelector(".product-name").innerText.toLowerCase();

if(name.includes(value))
p.style.display="block";
else
p.style.display="none";

});

});

</script>


</body>
</html>
