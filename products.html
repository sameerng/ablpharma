    <script>

        document.getElementById("resetFilters").addEventListener("click", function () {

            document.getElementById("category").value = "";
            document.getElementById("subcategory").innerHTML = "<option>Select Subcategory</option>";
            document.getElementById("subsubcategory").innerHTML = "<option>Select Type</option>";
            document.getElementById("searchProduct").value = "";

            let products = document.querySelectorAll(".product-item");

            products.forEach(function (product) {
                product.style.display = "block";
            });

        });

    </script>
    <script>

        const searchInput = document.getElementById("searchProduct");
        const products = document.querySelectorAll(".product-item");

        searchInput.addEventListener("keyup", filterProducts);

        function filterProducts() {

            let searchValue = searchInput.value.toLowerCase();

            products.forEach(product => {

                let name = product.querySelector(".product-name").textContent.toLowerCase();

                if (name.includes(searchValue)) {
                    product.style.display = "block";
                }
                else {
                    product.style.display = "none";
                }

            });

        }

    </script>
    <script>

        const data = {

            tablets: {

                "pain-relief": [
                    "Paracetamol",
                    "Ibuprofen",
                    "Diclofenac"
                ],

                "antibiotic": [
                    "Azithromycin",
                    "Amoxicillin"
                ],

                "vitamins": [
                    "Vitamin C",
                    "Multivitamin"
                ]

            },

            capsules: {

                "vitamin-capsules": [
                    "Vitamin D",
                    "Fish Oil",
                    "Omega 3"
                ],

                "antibiotic-capsules": [
                    "Doxycycline",
                    "Cephalexin"
                ]

            },

            syrups: {

                "cough": [
                    "Dry Cough Syrup",
                    "Expectorant Syrup"
                ],

                "children": [
                    "Kids Vitamin Syrup",
                    "Kids Fever Syrup"
                ]

            }

        };

        const category = document.getElementById("category");
        const subcategory = document.getElementById("subcategory");
        const subsubcategory = document.getElementById("subsubcategory");


        category.addEventListener("change", function () {

            subcategory.innerHTML = "<option>Select Subcategory</option>";
            subsubcategory.innerHTML = "<option>Select Type</option>";

            let selectedCategory = this.value;

            if (data[selectedCategory]) {

                for (let sub in data[selectedCategory]) {

                    let option = document.createElement("option");
                    option.value = sub;
                    option.text = sub;

                    subcategory.appendChild(option);

                }

            }

        });


        subcategory.addEventListener("change", function () {

            subsubcategory.innerHTML = "<option>Select Type</option>";

            let selectedCategory = category.value;
            let selectedSub = this.value;

            if (data[selectedCategory][selectedSub]) {

                data[selectedCategory][selectedSub].forEach(function (item) {

                    let option = document.createElement("option");

                    option.value = item;
                    option.text = item;

                    subsubcategory.appendChild(option);

                });

            }

        });

    </script>
